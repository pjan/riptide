<!doctype html>
<html>
    <head>
        <meta charset="UTF-8" />
        <title>Skiff Configuration</title>
        <style>
            body {
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    Oxygen, Ubuntu, Cantarell, sans-serif;
                padding: 20px;
                max-width: 500px;
                margin: 0 auto;
            }
            h1 {
                font-size: 24px;
                font-weight: 500;
                margin-bottom: 30px;
            }
            .form-group {
                margin-bottom: 20px;
            }
            label {
                display: block;
                margin-bottom: 5px;
                font-weight: 500;
                font-size: 14px;
            }
            input[type="text"],
            input[type="password"] {
                width: 100%;
                padding: 8px;
                border: 1px solid #ddd;
                border-radius: 4px;
                font-size: 14px;
                box-sizing: border-box;
            }
            input:focus {
                outline: none;
                border-color: #4285f4;
            }
            .checkbox-group {
                margin-bottom: 20px;
                display: flex;
                align-items: center;
            }
            .checkbox-group input[type="checkbox"] {
                width: auto;
                margin: 0 8px 0 0;
                cursor: pointer;
            }
            .checkbox-group label {
                margin-bottom: 0;
                cursor: pointer;
                font-weight: 400;
                user-select: none;
            }
            button {
                background-color: #4285f4;
                color: white;
                border: none;
                padding: 10px 20px;
                border-radius: 4px;
                font-size: 14px;
                cursor: pointer;
                margin-top: 10px;
            }
            button:hover {
                background-color: #357ae8;
            }
            .status {
                margin-top: 15px;
                padding: 10px;
                border-radius: 4px;
                display: none;
            }
            .status.success {
                background-color: #d4edda;
                color: #155724;
                border: 1px solid #c3e6cb;
            }
            .divider {
                border-top: 1px solid #ddd;
                margin: 30px 0 20px 0;
            }
            .section-title {
                font-size: 16px;
                font-weight: 500;
                color: #666;
                margin-bottom: 15px;
            }
        </style>
    </head>
    <body>
        <h1>Skiff Configuration</h1>

        <div class="form-group">
            <label for="serverAddress">Server Address:</label>
            <input type="text" id="serverAddress" placeholder="localhost" />
        </div>

        <div class="form-group">
            <label for="serverPort">Server Port:</label>
            <input type="text" id="serverPort" placeholder="8080" />
        </div>

        <div class="form-group">
            <label for="secret">Secret (X-Auth header):</label>
            <input
                type="password"
                id="secret"
                placeholder="Enter your secret"
            />
        </div>

        <div class="divider"></div>

        <div class="section-title">Debug Options</div>

        <div class="checkbox-group">
            <input type="checkbox" id="enableLogging" checked />
            <label for="enableLogging">Enable console logging</label>
        </div>

        <button id="save">Save Settings</button>

        <div id="status" class="status"></div>

        <script src="options.js"></script>
    </body>
</html>
